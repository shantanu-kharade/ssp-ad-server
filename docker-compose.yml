services:
  ssp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ssp-ad-server
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - LOG_LEVEL=debug
      - OTEL_EXPORTER_OTLP_ENDPOINT=otelcollector:4317
      - DB_URL=postgres://ssp:ssp@postgres:5432/ssp_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - DSP_ENDPOINTS=[{"name":"dsp-1","url":"http://dsp-simulator:80/status/204","timeout_ms":50,"weight":1},{"name":"dsp-2","url":"http://dsp-simulator:80/status/204","timeout_ms":50,"weight":1},{"name":"dsp-3","url":"http://dsp-simulator:80/status/204","timeout_ms":50,"weight":1}]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      otelcollector:
        condition: service_started
    networks:
      - ssp-network

  otelcollector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: ssp-otelcollector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"
    networks:
      - ssp-network

  postgres:
    image: postgres:16-alpine
    container_name: ssp-postgres
    environment:
      - POSTGRES_USER=ssp
      - POSTGRES_PASSWORD=ssp
      - POSTGRES_DB=ssp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssp -d ssp_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ssp-network

  redis:
    image: redis:7-alpine
    container_name: ssp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ssp-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ssp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      # Kafka and ZooKeeper metadata must be reset together to avoid cluster ID mismatch.
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - ssp-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ssp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      # Kafka and ZooKeeper metadata must be reset together to avoid cluster ID mismatch.
      - kafka_data:/var/lib/kafka/data
    networks:
      - ssp-network

  dsp-simulator:
    image: kennethreitz/httpbin
    container_name: dsp-simulator
    ports:
      - "8081:80"
      - "8082:80"
      - "8083:80"
    networks:
      - ssp-network

networks:
  ssp-network:
    driver: bridge

volumes:
  postgres_data:
  # Keep kafka_data and zookeeper_data lifecycle in sync (clear together with `docker compose down -v`).
  kafka_data:
  zookeeper_data:
