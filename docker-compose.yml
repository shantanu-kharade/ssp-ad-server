services:
  ssp:
    build: .
    container_name: ssp-ad-server
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - LOG_LEVEL=debug
      - DB_URL=postgres://ssp:ssp@postgres:5432/ssp_db?sslmode=disable
      - REDIS_URL=redis://redis:6379
      - KAFKA_BROKERS=kafka:9092
      - DSP_ENDPOINTS=[{"name":"dsp-1","url":"http://dsp-1/status/204","timeout_ms":50,"weight":1},{"name":"dsp-2","url":"http://dsp-2/status/204","timeout_ms":50,"weight":1},{"name":"dsp-3","url":"http://dsp-3/status/204","timeout_ms":50,"weight":1}]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - ssp-network

  postgres:
    image: postgres:16-alpine
    container_name: ssp-postgres
    environment:
      - POSTGRES_USER=ssp
      - POSTGRES_PASSWORD=ssp
      - POSTGRES_DB=ssp_db
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ssp -d ssp_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ssp-network

  redis:
    image: redis:7-alpine
    container_name: ssp-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ssp-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ssp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ssp-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ssp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - ssp-network

  # DSP Simulators: 3 instances of httpbin to simulate multiple endpoints
  dsp-1:
    image: kennethreitz/httpbin
    container_name: dsp-1
    ports:
      - "8081:80"
    networks:
      - ssp-network

  dsp-2:
    image: kennethreitz/httpbin
    container_name: dsp-2
    ports:
      - "8082:80"
    networks:
      - ssp-network

  dsp-3:
    image: kennethreitz/httpbin
    container_name: dsp-3
    ports:
      - "8083:80"
    networks:
      - ssp-network

networks:
  ssp-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  kafka_data:
